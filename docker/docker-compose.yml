x-images:
  - &mariadb_image
    mariadb:11
  - &nextcloud_image
    nextcloud:33-apache

services:
  db:
    image: *mariadb_image
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: nextcloud
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10
  nextcloud:
    build:
      context: ..
      dockerfile: docker/nextcloud-dev.Dockerfile
      args:
        BASE_IMAGE: *nextcloud_image
    image: nextcloud-codeinjector-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - path: ..
          target: /var/www/html/custom_apps/codeinjector
          action: sync
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/status.php"]
      interval: 10s
      retries: 15
      start_period: 30s
volumes:
  db_data:
